<!DOCTYPE html>
<html>
<head>
    <title>RingZero BBS - DialerSceneDemo</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; width: 100%; color: #0f0; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #terminal { position: absolute; z-index: 10; padding: 20px; width: 80%; }
        #overlay { position: absolute; z-index: 5; top: 0; left: 0; width: 100%; height: 100%; 
                   display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="overlay">CLICK TO DIAL RINGZERO (RINGZE.RO)</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('overlay');
        let width, height, time = 0;
        let started = false;

        function log(msg) { terminal.innerHTML += msg + "<br>"; }

        function startDemo() {
            if (started) return;
            started = true;
            overlay.style.display = 'none';
            
            // Dial-up sequence
            let steps = [
                "ATDT 816-ChixwitD...#$%#... RINGZERO",
                "CONNECT 14400 / ARQ",
                "--- RINGZERO BBS (ringze.ro) ---",
                "WELCOME, OPERATOR.",
                "LOADING DEMO PACK... INIT GRAPHICS...",
                "SCENE DATA LOADED. STARTING."
            ];
            
            let i = 0;
            const timer = setInterval(() => {
                log("> " + steps[i]);
                i++;
                if (i >= steps.length) {
                    clearInterval(timer);
                    setTimeout(() => terminal.style.display = 'none', 1000);
                    loop();
                }
            }, 800);
        }

        overlay.addEventListener('click', startDemo);
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawPlasma(t) {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            for (let x = 0; x < width; x+=4) {
                for (let y = 0; y < height; y+=4) {
                    const val = Math.sin(x/50 + t) + Math.sin((x+y)/50 + t) + Math.sin(y/50 + t);
                    const i = (y * width + x) * 4;
                    data[i] = val * 64 + 64;
                    data[i+1] = val * 128 + 128;
                    data[i+2] = 255;
                    data[i+3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function drawScroller(t) {
            ctx.fillStyle = '#fff';
            ctx.font = '40px monospace';
            const x = (width - (t * 150 % (width + 800)));
            ctx.fillText(">>> CONNECTED TO RINGZE.RO // BBS DEMO SCENE // STAY RADICAL!", x, height - 50);
        }

        function loop() {
            time += 0.05;
            ctx.clearRect(0, 0, width, height);
            drawPlasma(time);
            drawScroller(time);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
