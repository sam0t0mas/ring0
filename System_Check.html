
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #050505; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #crt { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        #container { width: 90vw; height: 90vh; border: 2px solid #0055ff; background: #000020; margin: 5vh auto; padding: 20px; overflow-y: auto; }
        #ascii-display { white-space: pre; font-size: 10px; color: #fff; margin-bottom: 20px; }
        canvas { width: 100%; height: 150px; image-rendering: pixelated; border: 1px solid #0f0; }
        .controls { margin-top: 20px; border-top: 1px solid #0f0; padding-top: 10px; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="crt"></div>
    <div id="container">
        <h1>RINGZE.RO // BBS v1.0 // MULTI-TRACK ENGINE</h1>
        <div id="ascii-display">LOAD AN ASCII FILE TO DISPLAY...</div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <input type="file" id="fileInput" style="display:none">
            <button onclick="document.getElementById('fileInput').click()">[ LOAD ASCII FILE ]</button>
            <button id="startBtn">[ START AUDIO ENGINE ]</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let audioCtx, masterGain;

        // --- File Loader ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('ascii-display').textContent = e.target.result; };
            reader.readAsText(file);
        });

        // --- Multi-Track Synth ---
        function playNote(freq, type, duration, startTime, gainVal) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(gainVal, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function startAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.2;
            masterGain.connect(audioCtx.destination);
            
            let time = audioCtx.currentTime;
            const sequence = () => {
                // Track 1: Bass (Sine)
                playNote(55, 'sine', 0.5, time, 0.3);
                // Track 2: Melody (Square)
                if (Math.random() > 0.5) playNote(220 + (Math.random() * 100), 'square', 0.2, time, 0.1);
                // Track 3: Percussion (Noise)
                if (Math.random() > 0.7) playNote(100, 'sawtooth', 0.1, time, 0.05);
                
                time += 0.5;
                setTimeout(sequence, 500);
            };
            sequence();
            render();
        }

        // --- Graphics ---
        let t = 0;
        function render() {
            t += 0.02;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0, canvas.width, canvas.height);
            for(let i=0; i<100; i++) {
                ctx.fillStyle = `hsl(${t*50 + i}, 100%, 50%)`;
                ctx.fillRect(i*5, Math.sin(t + i*0.1)*50 + 75, 4, 4);
            }
            requestAnimationFrame(render);
        }

        document.getElementById('startBtn').addEventListener('click', startAudio);
    </script>
</body>
</html>
