<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* CRT Scanline Effect */
        body::before { content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10; }

        #container { position: relative; width: 80vw; height: 80vh; border: 2px solid #0055ff; background: #000080; margin: 5vh auto; padding: 10px; box-shadow: 5px 5px 0px #000; }
        
        #marquee { background: #fff; color: #000; padding: 5px; font-weight: bold; overflow: hidden; white-space: nowrap; }
        #marquee span { display: inline-block; padding-left: 100%; animation: scroll 10s linear infinite; }
        @keyframes scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        #term { height: 70%; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        #overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5; cursor: pointer; }
    </style>
</head>
<body>

    <div id="container">
        <div id="marquee"><span>RINGZE.RO BBS // CALLING ALL NODES // SYSTEM ONLINE</span></div>
        <div id="term">
            <div id="overlay">
                <p>RINGZE.RO BBS v1.0 [1992]</p>
                <p>PRESS [ENTER] TO CONNECT</p>
            </div>
            <canvas id="canvas"></canvas>
        </div>
        <div style="padding-top: 10px;">C:\> RUN DEMO.EXE</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        let audioCtx, osc;

        function startDemo() {
            overlay.style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.05;
            osc.start();
            requestAnimationFrame(render);
        }

        let t = 0;
        function render() {
            t += 0.05;
            const w = canvas.width = 160;
            const h = canvas.height = 100;
            const img = ctx.createImageData(w, h);
            for (let i = 0; i < img.data.length; i += 4) {
                const x = (i / 4) % w;
                const y = Math.floor((i / 4) / w);
                const val = Math.sin(x / 8 + t) + Math.sin((y + t) / 8) + Math.sin((x + y + t) / 16);
                img.data[i] = val * 64 + 64;
                img.data[i+1] = val * 128 + 128;
                img.data[i+2] = 255;
                img.data[i+3] = 255;
            }
            ctx.putImageData(img, 0, 0);
            osc.frequency.value = 110 + Math.sin(t) * 40;
            requestAnimationFrame(render);
        }

        overlay.addEventListener('click', startDemo);
    </script>
</body>
</html>
