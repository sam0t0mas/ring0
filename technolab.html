    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.05),

  }

  .cursor {
    display: inline-block;
    width: 10px;
    background-color: #33ff33;
    margin-left: 2px;
  }

// =========================================================
// CONFIG
// =========================================================
const SPEED_CHARS_PER_SEC = 120;   // ~120bps
const CHUNK = 20;

// const SPEED_CHARS_PER_SEC = 7000;   // ~56kbps
// const CHUNK = 40;
const INTERVAL = (CHUNK / SPEED_CHARS_PER_SEC) * 1000;

const term = document.getElementById("terminal");
const cursor = document.getElementById("cursor");

// =========================================================
// CURSOR BLINK (SAFE FOR EDGE)
// =========================================================
setInterval(() => {
  cursor.style.visibility =
    cursor.style.visibility === "hidden" ? "visible" : "hidden";
}, 500);

// =========================================================
// SCROLLING BUFFER
// =========================================================
function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight });
}

// =========================================================
// DIAL-UP HANDSHAKE
// =========================================================
const handshake = [
  "ATDT 13 11 66 *1337#\r\n",
  "CONNECT 56000\r\n",
  "CARRIER DETECT\r\n",
  "NEGOTIATING PROTOCOL...\r\n",
  "PPP LCP CONFIGURATION\r\n",
  "AUTHENTICATING...\r\n",
  "CONNECTED TO r0.lpar\r\n\n"
];

function playHandshake(callback) {
  let i = 0;
  function next() {
    if (i >= handshake.length) return callback();
    term.textContent += handshake[i];
    scrollToBottom();
    i++;
    setTimeout(next, 300 + Math.random() * 200);
  }
  next();
}

// =========================================================
// MODEM-SPEED STREAMING OF ORIGINAL CONTENT
// =========================================================
function streamContent(callback) {
  let i = 0;
  function stream() {
    if (i >= ORIGINAL_CONTENT.length) return callback();

    const slice = ORIGINAL_CONTENT.slice(i, i + CHUNK);
    i += CHUNK;

    term.textContent += slice;
    scrollToBottom();
    setTimeout(stream, INTERVAL);
  }
  stream();
}

// =========================================================
// COMMAND INTERPRETER
// =========================================================
const commands = {
  help: "Available commands:\nhelp\nabout\nbbs\nexit",
  about: "Ring Zero BBS — Est. 1993\nSysOp: sam",
  bbs: "Loading BBS menu...\n[1] Messages\n[2] Files\n[3] Chat\n[4] Logoff",
  exit: "Goodbye."
};

function startInterpreter() {
  let buffer = "";

  term.textContent += "\n> ";

  window.addEventListener("keydown", e => {
    if (e.key.length === 1) {
      buffer += e.key;
      term.textContent += e.key;
    }

    if (e.key === "Enter") {
      term.textContent += "\n";
      const cmd = buffer.trim();
      buffer = "";

      if (commands[cmd]) {
        term.textContent += commands[cmd] + "\n";
      } else {
        term.textContent += "Unknown command\n";
      }

      term.textContent += "> ";
      scrollToBottom();
    }
  });
}

// =========================================================
// BOOT SEQUENCE
// =========================================================
playHandshake(() => {
  streamContent(() => {
    startInterpreter();
  });
});
