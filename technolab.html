<!DOCTYPE html>
<link rel="icon" href="/favicon_multi_resolution.ico" type="image/x-icon">

<html lang="en">
<head>
<meta charset="UTF-8">
<title>RingZeroBBS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background-color: #000;
    color: #33ff33;
    font-family: "Courier New", Courier, monospace;
    margin: 0;
    padding: 0;
    line-height: 1.5;
    text-shadow: 0 0 3px #0f0;
    overflow-x: hidden;
  }

  .crt {
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0% { opacity: 0.98; }
    50% { opacity: 1; }
    100% { opacity: 0.97; }
  }

  .scanlines:before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.05),
      rgba(0,255,0,0.05) 2px,
      rgba(0,255,0,0.02) 2px,
      rgba(0,255,0,0.02) 4px
    );
    z-index: 9999;
  }

  pre {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.4;
  }
</style>
</head>

<body class="scanlines crt">
<pre id="terminal"></pre>

<!-- TYPEWRITER SOUND -->
<audio id="keyclick" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=" preload="auto"></audio>

<script>
// =========================================================
// ORIGINAL CONTENT (INSERTED SAFELY AS TEXT)
// =========================================================

const ORIGINAL_CONTENT = `
PhoenixBIOS(tm) 1.10 ©1985-1992 Phoenix Technologies Ltd.
CPU: Intel 8088 @ 4.77MHz
Memory Test: 640K OK
Keyboard... Detected
Video Adapter... MDA
Fixed Disk... Present
Initializing System...
Loading Personal History Module...
Scanning Hardware Timeline...
Enumerating Machines...
Boot Sequence Complete.

Launching: RING ZERO – MY COMPUTING JOURNEY
-----------------------------------------------

Initializing Modem...
ATZ OK
ATDT 555-1337
CONNECT 14400bps
~~ carrier detected ~~
~~ negotiating protocol: V.32bis ~~
~~ enabling error correction: LAPM ~~
~~ enabling compression: V.42bis ~~
HANDSHAKE COMPLETE
Welcome to Ring Zero BBS…

───────────────────────────────────────────────────────────────────────────────
LOGIN: _
PASSWORD: _ _ _ _ _ _ _ _ _ _
ACCESS LEVEL: [GUEST] [USER] [ELITE] [SYSOP]
MESSAGE OF THE DAY:
Welcome back, operator. Carrier stable. ANSI active.
Timeline archive ready for retrieval.
───────────────────────────────────────────────────────────────────────────────

TIN is NOT SIN!

My entire career — every skill, every system I’ve built, every network I’ve architected — traces back to the machines I grew up with.
I didn’t learn technology from textbooks.
I learned it from hardware that crashed, software that misbehaved, and systems that demanded experimentation.

─────────────────────────── R I N G Z E R O S Y S T E M T I M E L I N E ────────────────────────────
1989 ─► IBM XT 4 MHz • 1 MB • DOS • Thexder • First machine • Learned boot configs
1991 ─► IBM PS/1 10 MHz • 2 MB • PC DOS • Commander Keen
1993 ─► 386 Clone DOOM • IRQ conflicts • Sound Blaster
1995 ─► 486SX Clone Win 3.11/95 • Novell IPX/SPX
1996–98 ─► Cyrix • AMD K2 • Celeron • Pentium II/III
1998–2004 ─► Pentium II 600 MHz Lab
2003–2006 ─► Laptop Era Begins
2006–2010 ─► SUN AMD Opteron
2010–2015 ─► Alienware Era
2014–2020 ─► HP N40L VMware Cluster
2018–2026 ─► HP i7 + Clone i7
2026 ─► Minisforum MS‑02

┌──────────────────────────────────────────────────────────────────────────────┐
│ R I N G Z E R O B B S │
│ ▒▒▒▒▒▒▒▒▒▒▒▒ MAIN MENU ▒▒▒▒▒▒▒▒▒▒▒▒ │
└──────────────────────────────────────────────────────────────────────────────┘
[1] MESSAGE BASES
[2] FILE AREAS
[3] ANSI ART GALLERY
[4] SYSOP CHAT
[5] TIMELINE ARCHIVE
[6] HARDWARE DATABASE
[7] NETWORK TOOLS
[8] LAB CONTROL PANEL
[9] USER SETTINGS
[0] LOG OFF / HANG UP

[ RING ZERO BBS OUTPUT WINDOW ]
Click a command from the menu to continue…
`;

// =========================================================
// CONFIG
// =========================================================
const SPEED_CHARS_PER_SEC = 7000;   // ~56kbps
const CHUNK = 40;
const INTERVAL = (CHUNK / SPEED_CHARS_PER_SEC) * 1000;

const term = document.getElementById("terminal");
const click = document.getElementById("keyclick");

// =========================================================
// ANSI COLOR SUPPORT
// =========================================================
function ansiToHtml(text) {
  return text
    .replace(/\x1b

\[32m/g, '<span style="color:#33ff33">')
    .replace(/\x1b

\[31m/g, '<span style="color:#ff3333">')
    .replace(/\x1b

\[34m/g, '<span style="color:#3333ff">')
    .replace(/\x1b

\[0m/g, '</span>');
}

// =========================================================
// SCROLLING BUFFER
// =========================================================
function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight });
}

// =========================================================
// TYPEWRITER SOUND
// =========================================================
function playClick() {
  click.currentTime = 0;
  click.play();
}

// =========================================================
// FLASHING CURSOR
// =========================================================
let cursorVisible = true;
setInterval(() => {
  cursorVisible = !cursorVisible;
  const cursor = cursorVisible ? "▮" : " ";
  term.innerHTML = term.innerHTML.replace(/▮| $/, cursor);
}, 500);

// =========================================================
// DIAL-UP HANDSHAKE
// =========================================================
const handshake = [
  "ATDT 555-1337\r\n",
  "CONNECT 56000\r\n",
  "CARRIER DETECT\r\n",
  "NEGOTIATING PROTOCOL...\r\n",
  "PPP LCP CONFIGURATION\r\n",
  "AUTHENTICATING...\r\n",
  "WELCOME TO RING ZERO BBS\r\n\n"
];

function playHandshake(callback) {
  let i = 0;
  function next() {
    if (i >= handshake.length) return callback();
    term.textContent += handshake[i];
    scrollToBottom();
    i++;
    setTimeout(next, 300 + Math.random() * 200);
  }
  next();
}

// =========================================================
// MODEM-SPEED STREAMING OF ORIGINAL CONTENT
// =========================================================
function streamContent(callback) {
  let i = 0;
  function stream() {
    if (i >= ORIGINAL_CONTENT.length) return callback();

    const slice = ORIGINAL_CONTENT.slice(i, i + CHUNK);
    i += CHUNK;

    playClick();
    term.innerHTML += ansiToHtml(slice);
    term.innerHTML = term.innerHTML.replace(/▮| $/, "") + "▮";

    scrollToBottom();
    setTimeout(stream, INTERVAL);
  }
  stream();
}

// =========================================================
// COMMAND INTERPRETER
// =========================================================
const commands = {
  help: "Available commands:\nhelp\nabout\nbbs\nexit",
  about: "Ring Zero BBS — Est. 1993\nSysOp: sam",
  bbs: "Loading BBS menu...\n[1] Messages\n[2] Files\n[3] Chat\n[4] Logoff",
  exit: "Goodbye."
};

function startInterpreter() {
  let buffer = "";

  term.textContent += "\n> ";

  window.addEventListener("keydown", e => {
    if (e.key.length === 1) {
      buffer += e.key;
      term.textContent += e.key;
      playClick();
    }

    if (e.key === "Enter") {
      term.textContent += "\n";
      const cmd = buffer.trim();
      buffer = "";

      if (commands[cmd]) {
        term.textContent += commands[cmd] + "\n";
      } else {
        term.textContent += "Unknown command\n";
      }

      term.textContent += "> ";
      scrollToBottom();
    }
  });
}

// =========================================================
// BOOT SEQUENCE
// =========================================================
playHandshake(() => {
  streamContent(() => {
    startInterpreter();
  });
});
</script>

</body>
</html>
