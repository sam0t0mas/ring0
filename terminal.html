<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Terminal - VCF Labs</title>
    <style>
        body {
            background-color: #050505;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px #33ff33;
        }

        #terminal-output {
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        #input-area { display: flex; }
        #prompt { margin-right: 10px; }

        input {
            background: transparent;
            border: none;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
        }

        #htop-display {
            border: 1px solid #33ff33;
            padding: 10px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="terminal-output">Welcome to VCF Terminal v1.1. 
Type 'help' to see available commands.
</div>

    <div id="htop-display"></div>

    <div id="input-area">
        <span id="prompt">user@vcf-lab:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>

    <script>
        // File System structure
        const fs = {
            "home": {
                "type": "dir",
                "content": {
                    "readme.txt": "VCF 9.1 Project Status\n- Engineering environment deployment confirmed."
                }
            }
        };

        let currentPath = ["home"];
        let htopInterval = null;
        const output = document.getElementById('terminal-output');
        const input = document.getElementById('cmd-input');
        const htopDiv = document.getElementById('htop-display');

        function getCurrentDir() {
            let dir = fs;
            currentPath.forEach(p => dir = dir[p].content);
            return dir;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const command = input.value.trim();
                processCommand(command);
                input.value = '';
            }
        });

        function processCommand(cmd) {
            const parts = cmd.split(' ');
            const action = parts[0];
            const arg = parts[1];

            // Stop htop if running
            if (htopInterval) {
                clearInterval(htopInterval);
                htopInterval = null;
                htopDiv.style.display = 'none';
            }

            output.innerText += `\nuser@vcf-lab:~/${currentPath.join('/')}$ ${cmd}\n`;

            switch(action) {
                case 'ls':
                    output.innerText += Object.keys(getCurrentDir()).join('  ') + '\n';
                    break;
                case 'cat':
                    const file = getCurrentDir()[arg];
                    if (file && file.type !== 'dir') {
                        output.innerText += file.content + '\n';
                    } else {
                        output.innerText += `cat: ${arg}: No such file\n`;
                    }
                    break;
                case 'mkdir':
                    if (arg) {
                        getCurrentDir()[arg] = { type: 'dir', content: {} };
                    }
                    break;
                case 'touch':
                    if (arg) {
                        getCurrentDir()[arg] = { type: 'file', content: "" };
                    }
                    break;
                case 'htop':
                    runHtop();
                    break;
                case 'help':
                    output.innerText += "Available: ls, cd, cat [file], mkdir [dir], touch [file], htop, help\n";
                    break;
                default:
                    output.innerText += `Command not found: ${action}\n`;
            }
            window.scrollTo(0, document.body.scrollHeight);
        }

        function runHtop() {
            htopDiv.style.display = 'block';
            htopInterval = setInterval(() => {
                const mem = Math.floor(Math.random() * 80) + 20;
                const cpu = Math.floor(Math.random() * 50) + 10;
                htopDiv.innerText = `[HTOP SESSION STATS]\nCPU: [${'|'.repeat(cpu/5)}${'.'.repeat(20-cpu/5)}] ${cpu}%\nMEM: [${'|'.repeat(mem/5)}${'.'.repeat(20-mem/5)}] ${mem}%\n(Press any key to exit)`;
            }, 1000);
        }
    </script>
</body>
</html>
