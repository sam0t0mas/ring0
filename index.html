<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VCF_LAB_PORTAL</title>
    <style>
        body {
            background-color: #008080;
            font-family: "MS Sans Serif", "Microsoft Sans Serif", Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Desktop Icons */
        .desktop-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .icon {
            width: 64px;
            text-align: center;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            text-shadow: 1px 1px 1px #000;
        }

        .icon-box {
            width: 32px;
            height: 32px;
            background: #c0c0c0;
            border: 1px solid #000;
            margin: 0 auto 5px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* The Main Window */
        .window {
            position: absolute;
            top: 50px;
            left: 100px;
            background-color: #c0c0c0;
            border: 2px solid #000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            width: 400px;
            padding: 3px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.5);
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        .content {
            background-color: #ffffff;
            border: 2px inset #ffffff;
            padding: 20px;
            margin-top: 3px;
            height: 200px;
        }

        a { color: #000; text-decoration: none; display: block; margin-bottom: 10px; }
        a:hover { background: #000080; color: #fff; }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: #c0c0c0;
            border-top: 2px solid #fff;
            display: flex;
            align-items: center;
            padding: 0 5px;
        }

        .start-btn {
            background: #c0c0c0;
            border: 2px outset #fff;
            padding: 2px 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Desktop Icons -->
    <div class="desktop-icons">
        <div class="icon">
            <div class="icon-box">📁</div>
            <a href="terminal.html">My Computer</a>
        </div>
        <div class="icon">
            <div class="icon-box">🗑️</div>
            Recycle Bin
        </div>
    </div>

    <!-- Main Explorer Window -->
    <div class="window">
        <div class="title-bar">
            <span>VCF_Lab_Portal - [C:\]</span>
            <div style="font-size:10px">X</div>
        </div>
        <div class="content">
            <p>Select a file to open:</p>
            <a href="vcf-lab-blog.html">📄 The_Ultimate_VCF_Lab.html</a>
            <a href="cars-JBvTJ.html">🚗 Camira v Magna</a>
            <a href="#">📁 Archive_Logs</a>
            <a href="#">📁 Backup_Configs</a>
            <a href="#">⚠️ System_Check.exe</a>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="start-btn"><a href="ringo.html">Start</a></div>
    </div>

</body>
</html>
